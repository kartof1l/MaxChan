<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МаксЧан - Админ панель</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="logo-mch">МЧ</div>
                <a href="/" class="logo">Макс<span>Чан</span></a>
            </div>
            <nav class="nav">
                <a href="/">На сайт</a>
                <a href="/admin/dashboard">Админка</a>
                <a href="/admin/logout">Выйти</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="admin-panel">
            <h1 class="admin-title">Панель управления</h1>
            
            <h2>Добавить новый чан</h2>
            <form action="/admin/create" method="POST" enctype="multipart/form-data" class="admin-form">
                <input type="text" name="name" placeholder="Название чана" required>
                <input type="number" name="price" placeholder="Цена" required>
                <textarea name="description" placeholder="Краткое описание" rows="3" required></textarea>
                <textarea name="full_desc" placeholder="Полное описание" rows="5" required></textarea>
                <input type="file" name="image" accept="image/*" required>
                <button type="submit" class="btn">Добавить чан</button>
            </form>
            
            <h2 style="margin-top: 40px;">Существующие чаны</h2>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Фото</th>
                        <th>Название</th>
                        <th>Цена</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .Products}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td><img src="{{.ImageURL}}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px;"></td>
                        <td>{{.Name}}</td>
                        <td>{{.Price}} </td>
                        <td>
                            <a href="/admin/edit/{{.ID}}" class="btn" style="padding: 8px 16px;"> Редакт.</a>
                            <a href="/admin/delete/{{.ID}}" class="btn btn-outline" style="padding: 8px 16px;" onclick="return confirm('Удалить этот чан?')"> Удалить</a>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
